<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preload" href="./JSON/setup.json" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="./styles.css" as="style">
    <link rel="preload" href="./custom.css" as="style">

    <script src="js/generators/head-generator.js" type="module"></script>

    <data-custom-head
        data-components="custom-block custom-header custom-logo custom-nav custom-slider"
        data-title="Nexus Agency | Next-Gen Web"
        data-description="We build blazing fast, statically compiled interfaces."
        data-canonical="https://rainwilds.github.io/Sandbox/agency.html"
        data-theme="cyberpunk"
        data-hero-image="tourism-photography-light-5.jpg, tourism-photography-dark-5.jpg"
        data-hero-size="(max-width: 768px) 100vw, (max-width: 1024px) 100vw, (max-width: 1366px) 100vw, (max-width: 1920px) 100vw, (max-width: 2560px) 100vw, (max-width: 3840px) 100vw, 3840px"
        data-hero-format="avif"
        data-hero-count="2">
    </data-custom-head>
</head>
<body>

    <custom-header 
        position="sticky-top" 
        backdrop-filter="blur-md" 
        background-color="background-color-2" 
        shadow="shadow-medium"
        logo-placement="nav"
        nav-alignment="center-right">
        
        <custom-logo 
            logo-full-light-src="logo-full-light-1.svg" 
            logo-full-dark-src="logo-full-dark-1.svg" 
            logo-icon-light-src="logo-icon-light-1.svg"
            logo-icon-dark-src="logo-icon-dark-1.svg"
            logo-full-primary-alt="Nexus Logo"
            logo-icon-primary-alt="Nexus Icon"
            logo-breakpoint="1024"
            logo-height="35px">
        </custom-logo>
        
        <custom-nav>
            <a href="/">Home</a>
            <a href="#services">Services</a>
            <a href="#portfolio">Portfolio</a>
            <a href="/contact" class="button button-primary">Let's Talk</a>
        </custom-nav>
    </custom-header>

    <main>
        <custom-block 
            style="grid-column: 1 / -1; min-height: 80vh;"
            inner-class="padding-large max-width-large"
            img-background-light-src="tourism-photography-light-5.jpg"
            img-background-dark-src="tourism-photography-dark-5.jpg"
            img-background-alt="Abstract digital architecture"
            img-background-fetchpriority="high"
            img-background-loading="eager"
            background-overlay="background-overlay-black"
            inner-alignment="center-left"
            heading="Next-Gen Experiences"
            heading-tag="h1"
            paragraph="We construct blazing fast, statically compiled interfaces using native Web Components. Zero framework bloat. Total performance."
            ul-items="Static Site Generation, Advanced Theming, Core Web Vitals Optimization"
            ul-icon="<i class='fa-solid fa-bolt'></i>"
            button-text="Explore Capabilities"
            button-href="#services"
            button-class="button-primary">
        </custom-block>

        <custom-block 
            style="grid-column: 1 / -1; min-height: 40vh; margin: 4rem 0;"
            background-color="background-color-1"
            inner-class="padding-huge"
            inner-background-gradient="background-gradient-1"
            inner-background-image-noise
            inner-alignment="center"
            text-alignment="center"
            heading="Uncompromising Architecture"
            heading-tag="h2"
            paragraph="Experience zero layout shift and instant hydration. Our modular components are designed to execute flawlessly."
            button-text="Read the Docs"
            button-class="button-secondary">
        </custom-block>

        <section id="portfolio" style="padding: 2rem 0 6rem 0;">
            <custom-block 
                heading="Recent Works" 
                heading-tag="h2"
                text-alignment="center"
                paragraph="A cinematic look at our latest deployments.">
            </custom-block>

            <custom-slider 
                slides-per-view="1"
                cross-fade
                autoplay="4s"
                pagination
                pagination-position="overlay"
                style="margin-top: 2rem; border-radius: var(--border-radius-large); overflow: hidden; box-shadow: var(--shadow-heavy); min-height: 60vh;">
                
                <custom-block 
                    img-background-light-src="tourism-photography-light-2.jpg"
                    img-background-dark-src="tourism-photography-dark-2.jpg"
                    img-background-alt="Project Alpha"
                    background-overlay="background-overlay-black"
                    inner-class="padding-huge"
                    inner-alignment="bottom-left"
                    heading="Project Alpha"
                    heading-tag="h3"
                    paragraph="A complete digital transformation for global logistics.">
                </custom-block>

                <custom-block 
                    img-background-light-src="tourism-photography-light-1.jpg"
                    img-background-dark-src="tourism-photography-dark-1.jpg"
                    img-background-alt="Project Beta"
                    background-overlay="background-overlay-black"
                    inner-class="padding-huge"
                    inner-alignment="bottom-left"
                    heading="Project Beta"
                    heading-tag="h3"
                    paragraph="E-commerce integrated natively via Snipcart.">
                </custom-block>

                <custom-block 
                    img-background-light-src="tourism-photography-light-4.jpg"
                    img-background-dark-src="tourism-photography-dark-4.jpg"
                    img-background-alt="Project Gamma"
                    background-overlay="background-overlay-black"
                    inner-class="padding-huge"
                    inner-alignment="bottom-left"
                    heading="Project Gamma"
                    heading-tag="h3"
                    paragraph="Dynamic media delivery with automatic pause-on-scroll.">
                </custom-block>
            </custom-slider>
        </section>
    </main>

</body>
</html>
