<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Visual Builder Experiment</title>

    <link
      rel="stylesheet"
      href="./styles.css" />

    <script
      type="module"
      src="./js/components/custom-block.js"></script>
    <script
      type="module"
      src="./js/components/custom-slider.js"></script>
    <script
      type="module"
      src="./js/components/custom-layout.js"></script>
    <script
      type="module"
      src="./js/builder/visual-builder.js"></script>

    <style>
body {
        margin: 0;
        /* Padding maps to our CSS variables, with fallbacks */
        padding: 60px var(--builder-right, 300px) 0 var(--builder-left, 260px);
        display: flex;
        justify-content: center; /* This perfectly centers the canvas when max-width changes! */
        background-color: #09090b;
        box-sizing: border-box;
        min-height: 100vh;
      }

      #canvas {
        flex-grow: 1;
        width: 100%;
        padding: 2rem;
        background-color: #ffffff;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        border-radius: 8px 8px 0 0;
      }

      .builder-selected > * {
        outline: 3px solid #3b82f6 !important;
        outline-offset: -3px; 
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>

    <visual-builder></visual-builder>
  </body>
</html>
