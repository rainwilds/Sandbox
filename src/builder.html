<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Visual Builder</title>

    <link
      rel="stylesheet"
      href="./css/styles.css" />

    <script
      type="module"
      src="./js/builder/visual-builder.js"></script>

    <style>
      body {
        margin: 0;
        /* Padding maps to our CSS variables, with fallbacks */
        padding: 60px var(--builder-right, 300px) 35px var(--builder-left, 260px);
        background-color: #414141;
        box-sizing: border-box;
        height: 100vh;
        overflow: hidden; /* Prevent the whole page from scrolling */
      }

   #workspace {
        width: 100%;
        height: 100%;
        overflow-x: hidden; 
        overflow-y: scroll; /* ALWAYS show scrollbar to prevent layout shifting */
        display: flex;
        justify-content: center; 
        align-items: start; 
        padding: 24px; 
        box-sizing: border-box;
      }

     #canvas {
        flex-shrink: 0; 
        width: 100%; 
        background-color: #ffffff;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75); /* Deep floating shadow */
        border-radius: 0; /* Removed rounded corners */
        transform-origin: top center; 
        transition: transform 0.2s ease, width 0.3s ease;
      }

      .builder-selected > * {
        outline: 3px solid #3b82f6 !important;
        outline-offset: -3px;
      }
    </style>
  </head>
  <body>
    <div
      id="workspace"
      class="workspace">
      <div id="canvas"></div>
    </div>

    <visual-builder></visual-builder>
  </body>
</html>
